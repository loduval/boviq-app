# BOVIQ — Mise à jour automatique des cours du marché
# Télécharge les Excel DG AGRI et génère cours-data.json
# Fréquence : chaque lundi à 7h UTC (9h heure de Paris)
# + déclenchement manuel possible

name: 📊 Mise à jour cours du marché

on:
  schedule:
    - cron: '0 7 * * 1'  # Lundi 7h UTC = 9h Paris
  workflow_dispatch:       # Bouton manuel dans GitHub

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install openpyxl

      - name: 🔄 Télécharger et convertir les données
        run: python scripts/update-cours-data.py

      - name: 📤 Commit et push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/cours-data.json
          if git diff --staged --quiet; then
            echo "Aucun changement détecté"
          else
            git commit -m "📊 Cours mis à jour $(date -u +'%Y-%m-%d')"
            git push
            echo "✅ Données poussées"
          fi
