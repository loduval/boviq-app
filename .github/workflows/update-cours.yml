name: 📊 Mise à jour cours du marché

on:
  schedule:
    # Chaque lundi à 8h UTC (10h heure française)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Lancement manuel possible

jobs:
  update-cours:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer openpyxl
        run: pip install openpyxl

      - name: Télécharger et convertir les données
        run: python scripts/update-cours-data.py

      - name: Commit et push si données modifiées
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/cours-data.json
          git diff --cached --quiet || (git commit -m "📊 MAJ cours du marché $(date +%Y-%m-%d)" && git push)
